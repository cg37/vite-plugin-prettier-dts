name: Publish to npm

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            dry-run:
                description: "只构建不发布（预检模式）"
                type: boolean
                default: false

permissions:
    id-token: write # Required for OIDC
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        env:
            PNPM_MINIMUM_RELEASE_AGE: "0"
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false # never use caching in release builds

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

            - name: Publish to npm
              if: ${{ !inputs.dry-run }}
              run: pnpm publish --no-git-checks

            - name: Dry-run 模式 — 跳过发布
              if: ${{ inputs.dry-run }}
              run: echo "✅ 预检完成，未执行发布"
